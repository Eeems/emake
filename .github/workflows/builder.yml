name: Build builder image
on:
  pull_request: &on-filter
    branches:
      - master
    paths:
      - .github/workflows/builder.yml
      - "builder/**"
  push: *on-filter

permissions:
  contents: read
  packages: write

jobs:
  builder:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python:
          - "3.11"
          - "3.12"
          - "3.13"
          - "3.14"
        libc:
          - glibc
          - musl
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr
        uses: docker/login-action@v4
        with:
          username: ${{github.actor}}
          password: ${{ secrets.GITHUB_TOKEN }}
          registry: ghcr.io

      - name: Generate tags
        id: meta
        run: |
          IMAGE_NAME=ghcr.io/eeems/emake-builder
          echo "image=${IMAGE_NAME}" >> $GITHUB_OUTPUT
          echo "tags=${IMAGE_NAME}:${{ matrix.python }}-${{ matrix.libc }}" >> $GITHUB_OUTPUT
          cat $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: builder/${{ matrix.libc }}.Containerfile
          platforms: linux/amd64,linux/386,linux/ppc64le,linux/arm64,linux/arm/v7,linux/riscv64,linux/s390x
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          build-args: PYTHON_VERSION=${{ matrix.python }}
